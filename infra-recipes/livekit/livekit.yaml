# LiveKit production configuration
# Sanitized — replace ${VAR} placeholders before use
#
# Setup:
#   1. Generate API key + secret: ./scripts/generate-livekit-keys.sh
#   2. Issue cert for TURN domain via certbot
#   3. Mount cert files into the LiveKit container
#   4. Open UDP 3478 (TURN), TCP 5349 (TURN-TLS), UDP 50000-50100 (RTC)
#
# Reference: https://docs.livekit.io/home/self-hosting/deployment/

port: 7880
bind_addresses:
  - ""

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: true
  node_ip: "${SERVER_IP}"                # public IP of this server

redis:
  address: app-redis:6379                  # use shared-stack redis
  password: ${REDIS_PASSWORD}
  db: 0

log_level: info

room:
  empty_timeout: 300                      # close empty rooms after 5min

# TURN server with TLS
# This lets clients behind strict firewalls connect via TCP 443/5349
turn:
  enabled: true
  domain: ${TURN_DOMAIN}                  # e.g. turn.example.com
  udp_port: 3478
  tls_port: 5349
  cert_file: /etc/livekit/turn.crt        # mounted from /etc/letsencrypt/live/${TURN_DOMAIN}/fullchain.pem
  key_file: /etc/livekit/turn.key         # mounted from /etc/letsencrypt/live/${TURN_DOMAIN}/privkey.pem

# API key configuration
# Generate with: livekit-server generate-keys
# Or use the generate-livekit-keys.sh script
keys:
  ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
