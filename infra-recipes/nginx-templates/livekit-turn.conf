# LiveKit / WebRTC TURN-TLS proxy
# For: TURN server with TLS so it works through corporate firewalls
# Replace: {{DOMAIN}} (e.g., turn.example.com)
#
# Requires: certbot already issued cert for {{DOMAIN}}
# Pair with LiveKit running on port 7880 (HTTP signaling) and 5349 (TURN/TLS)

# WebRTC signaling (HTTPS)
server {
    listen 443 ssl http2;
    server_name {{DOMAIN}};

    ssl_certificate     /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket for signaling
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 24h;
        proxy_buffering off;
    }
}

# TURN server typically runs as its own process (not via nginx)
# but the cert needs to be readable by LiveKit:
#
# In livekit.yaml:
#   turn:
#     enabled: true
#     domain: {{DOMAIN}}
#     udp_port: 3478
#     tls_port: 5349
#     cert_file: /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem
#     key_file: /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem
#
# Then mount /etc/letsencrypt as read-only into the LiveKit container.
# Configure UFW: ufw allow 3478/udp; ufw allow 5349/tcp; ufw allow 50000:50100/udp
