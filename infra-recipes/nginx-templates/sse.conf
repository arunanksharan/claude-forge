# HTTPS reverse proxy with SSE support (Server-Sent Events)
# For: streaming LLM responses, real-time event feeds
# Pair with WebSocket location for chat apps that use both

server {
    listen 80;
    server_name {{DOMAIN}};
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name {{DOMAIN}};

    ssl_certificate     /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    client_max_body_size 25M;

    # Default — normal proxy
    location / {
        proxy_pass http://127.0.0.1:{{UPSTREAM_PORT}};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE endpoint — long timeout, no buffering
    location ~ ^/(sse|events|stream) {
        proxy_pass http://127.0.0.1:{{UPSTREAM_PORT}};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Critical for SSE — disable nginx buffering
        proxy_set_header X-Accel-Buffering no;
        proxy_buffering off;
        proxy_cache off;

        # Long-lived
        proxy_read_timeout 24h;
        chunked_transfer_encoding on;
    }
}
