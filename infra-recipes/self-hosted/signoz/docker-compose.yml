# SigNoz Local OTel Collector (lightweight)
# ==========================================
# Receives OTLP traces/metrics/logs and logs them.
# For full SigNoz stack with ClickHouse + UI, see https://signoz.io/docs/install/
#
# Usage:
#   docker compose up -d
#   ./test-trace.sh   # send a test trace
#   docker logs signoz-otel-collector

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: signoz-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "13133:13133"   # health check
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:13133/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    external: true
