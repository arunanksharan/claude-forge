# Redis configuration — production-leaning defaults for shared infrastructure
# Suitable for cache + queue broker (BullMQ / Celery) workloads

# Network
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# General
daemonize no
loglevel notice
databases 16

# Snapshotting (RDB) — saves periodically
# Format: save <seconds> <changes>
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF — for queue durability (BullMQ jobs survive restart)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory — tune per host
maxmemory 2gb
maxmemory-policy noeviction        # 'allkeys-lru' for cache-only; 'noeviction' for queues+sessions
maxmemory-samples 5

# Lazy free (non-blocking deletes)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes
lazyfree-lazy-user-del yes

# Slow log
slowlog-log-slower-than 10000        # 10ms
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 100

# Replication (if used)
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 5
repl-disable-tcp-nodelay no
replica-priority 100

# Client output buffer
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60
